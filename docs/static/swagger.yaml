        description: |-
          UserAgent is the HTTP User-Agent sent to indexers when resolving nzblnk:// links.
          Defaults to a browser-like string. Leave empty to use the default.
        type: string
    type: object
  config.ProviderConfig:
    properties:
      account_expiration_date:
        type: string
      enabled:
        type: boolean
      host:
        type: string
      id:
        type: string
      inflight_requests:
        type: integer
      insecure_tls:
        type: boolean
      is_backup_provider:
        type: boolean
      keepalive_command:
        type: string
      keepalive_interval_seconds:
        type: integer
      last_rtt_ms:
        type: integer
      last_speed_test_mbps:
        type: number
      last_speed_test_time:
        type: string
      max_connections:
        type: integer
      name:
        type: string
      port:
        type: integer
      proxy_url:
        type: string
      quota_bytes:
        type: integer
      quota_period_hours:
        type: integer
      skip_ping:
        type: boolean
      stat_inflight_requests:
        type: integer
      storage_group:
        type: string
      tls:
        type: boolean
      user_agent:
        type: string
      username:
        type: string
    type: object
  config.ProwlarrConfig:
    properties:
      api_key:
        description: APIKey is the Prowlarr API key.
        type: string
      categories:
        description: |-
          Categories filters search results by Newznab category IDs.
          Defaults to 5000 (Movies), 5010 (Movies/Foreign), 5030 (TV), 5040 (TV/HD).
        items:
          type: integer
        type: array
      enabled:
        description: Enabled controls whether Prowlarr search is active for the Stremio
          addon.
        type: boolean
      host:
        description: Host is the Prowlarr base URL (e.g. "http://localhost:9696").
        type: string
      languages:
        description: "Languages is an optional list of keywords; releases must contain
          at least one to pass.\nEmpty = no filtering. Examples: [\"Esp\", \"\U0001F1EA\U0001F1F8\",
          \"Spanish\", \"DUAL\"]"
        items:
          type: string
        type: array
      qualities:
        description: |-
          Qualities is an optional list of keywords; releases must contain at least one to pass.
          Empty = no filtering. Examples: ["1080p", "HD", "4K", "3D"]
        items:
          type: string
        type: array
    type: object
  config.RCloneConfig:
    properties:
      allow_non_empty:
        type: boolean
      allow_other:
