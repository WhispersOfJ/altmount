        type: boolean
      async_read:
        type: boolean
      attr_timeout:
        type: string
      buffer_size:
        type: string
      cache_dir:
        description: VFS Cache Settings
        type: string
      dir_cache_time:
        type: string
      gid:
        type: integer
      links:
        type: boolean
      log_level:
        type: string
      mount_enabled:
        description: Mount Configuration
        type: boolean
      mount_options:
        additionalProperties:
          type: string
        type: object
      no_checksum:
        type: boolean
      no_mod_time:
        description: Advanced Settings
        type: boolean
      path:
        description: RClone Path
        type: string
      rc_enabled:
        description: RC (Remote Control) Configuration
        type: boolean
      rc_options:
        additionalProperties:
          type: string
        type: object
      rc_pass:
        type: string
      rc_port:
        type: integer
      rc_url:
        type: string
      rc_user:
        type: string
      read_only:
        type: boolean
      syslog:
        type: boolean
      timeout:
        type: string
      transfers:
        type: integer
      uid:
        type: integer
      umask:
        type: string
      use_mmap:
        type: boolean
      vfs_cache_max_age:
        type: string
      vfs_cache_max_size:
        type: string
      vfs_cache_min_free_space:
        type: string
      vfs_cache_mode:
        type: string
      vfs_cache_poll_interval:
        type: string
      vfs_disk_space_total:
        type: string
      vfs_fast_fingerprint:
        type: boolean
      vfs_name:
        type: string
      vfs_read_ahead:
        type: string
      vfs_read_chunk_size:
        type: string
      vfs_read_chunk_size_limit:
        type: string
      vfs_read_chunk_streams:
        type: integer
    type: object
  config.RepairConfig:
    properties:
      enabled:
        type: boolean
      exponential_backoff:
        type: boolean
      interval_minutes:
        type: integer
      max_cooldown_hours:
        type: integer
      max_repair_retries:
        type: integer
    type: object
  config.SABnzbdCategory:
    properties:
      dir:
        type: string
      name:
        type: string
      order:
        type: integer
      priority:
        type: integer
      type:
        description: '"sonarr" or "radarr"'
        type: string
    type: object
  config.SABnzbdConfig:
    properties:
      categories:
        items:
          $ref: '#/definitions/config.SABnzbdCategory'
        type: array
      complete_dir:
        type: string
      download_client_base_url:
        type: string
      enabled:
        type: boolean
      fallback_api_key:
        description: Masked in API responses
        type: string
      fallback_host:
        description: Fallback configuration for sending failed imports to external
          SABnzbd
        type: string
      history_retention_minutes:
        description: |-
          HistoryRetentionMinutes controls how far back the SABnzbd-emulating history
          endpoint looks into import_history when *arr clients poll without a specific
          nzo_id filter. Older entries are still returned when *arr asks for them by
          nzo_id. Defaults to 10080 (7 days).
        type: integer
    type: object
  config.SegmentCacheConfig:
    properties:
      cache_path:
        type: string
      enabled:
        type: boolean
      expiry_hours:
        type: integer
      max_size_gb:
        type: integer
    type: object
  config.StreamingConfig:
    properties:
      failure_masking:
        $ref: '#/definitions/config.FailureMaskingConfig'
      max_prefetch:
        type: integer
    type: object
  config.StremioConfig:
    properties:
      base_url:
        description: |-
          BaseURL is the public base URL used when building Stremio stream links
          (e.g. "https://bearmount.example.com"). Falls back to the auto-detected
          request origin when not set.
        type: string
      enabled:
        description: |-
          Enabled controls whether the endpoint is active. Disabled by default.
          When false, the endpoint returns 404 Not Found.
        type: boolean
      nzb_ttl_hours:
        description: |-
          NzbTTLHours controls how long a completed NZB result is cached before
          the same NZB is re-processed on the next request.
          Set to 0 to disable expiry (cache forever). Defaults to 24 hours.
        type: integer
      prowlarr:
        allOf:
        - $ref: '#/definitions/config.ProwlarrConfig'
        description: Prowlarr configures the Prowlarr indexer used by the Stremio
          addon to search for NZBs.
    type: object
  config.StuckCleanupRule:
    properties:
      action:
        type: string
      enabled:
        type: boolean
      message:
        type: string
    type: object
  config.WebDAVConfig:
    properties:
      host:
        type: string
      password:
        type: string
      port:
        type: integer
      user:
        type: string
    type: object
  database.HealthPriority:
    enum:
    - 0
    - 1
    - 2
    type: integer
    x-enum-varnames:
    - HealthPriorityNormal
    - HealthPriorityHigh
    - HealthPriorityNext
  database.HealthStatus:
    enum:
    - pending
    - checking
    - healthy
    - repair_triggered
    - corrupted
    - degraded
    type: string
    x-enum-comments:
      HealthStatusChecking: File is currently being checked
      HealthStatusCorrupted: File has missing segments or is corrupted
      HealthStatusDegraded: 'Missing segments only hit media payload: still playable,
        no repair'
      HealthStatusHealthy: File passed health check
      HealthStatusPending: File has not been checked yet
      HealthStatusRepairTriggered: File repair has been triggered in Arrs
    x-enum-descriptions:
    - File has not been checked yet
    - File is currently being checked
    - File passed health check
    - File repair has been triggered in Arrs
    - File has missing segments or is corrupted
    - 'Missing segments only hit media payload: still playable, no repair'
    x-enum-varnames:
    - HealthStatusPending
    - HealthStatusChecking
    - HealthStatusHealthy
    - HealthStatusRepairTriggered
    - HealthStatusCorrupted
    - HealthStatusDegraded
  database.QueuePriority:
    enum:
    - 1
    - 2
    - 3
    type: integer
    x-enum-varnames:
    - QueuePriorityHigh
    - QueuePriorityNormal
    - QueuePriorityLow
  database.QueueStatus:
    enum:
    - pending
    - processing
    - completed
    - failed
    - paused
    - fallback
    type: string
    x-enum-comments:
      QueueStatusFallback: Sent to external SABnzbd as fallback
    x-enum-descriptions:
    - ""
    - ""
    - ""
    - ""
    - ""
    - Sent to external SABnzbd as fallback
    x-enum-varnames:
    - QueueStatusPending
    - QueueStatusProcessing
    - QueueStatusCompleted
    - QueueStatusFailed
    - QueueStatusPaused
    - QueueStatusFallback
host: localhost:8080
info:
  contact:
    name: BearMount
    url: https://github.com/WhispersOfJ/bearmount/issues
  description: REST API for BearMount — Usenet WebDAV server with NZB queue, health
    monitoring, ARR integration, FUSE/rclone mounting, and Stremio addon.
  license:
    name: MIT
  termsOfService: https://github.com/WhispersOfJ/bearmount
  title: BearMount API
  version: "1.0"
paths:
  /arrs/download-client/register:
    post:
      description: Automatically registers BearMount as a download client (SABnzbd-compatible)
        in all configured ARR instances.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/api.APIResponse'
      security:
      - BearerAuth: []
      summary: Register ARR download clients
      tags:
      - ARRs
  /arrs/download-client/test:
    post:
      description: Tests whether BearMount is reachable as a download client from
        all configured ARR instances.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.APIResponse'
      security:
      - BearerAuth: []
      summary: Test ARR download clients
      tags:
      - ARRs
  /arrs/health:
    get:
      description: Returns health check results from all configured ARR instances.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.APIResponse'
      security:
      - BearerAuth: []
      summary: Get ARR health
      tags:
      - ARRs
  /arrs/instances:
    get:
      description: Returns all configured ARR instances.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.APIResponse'
      security:
      - BearerAuth: []
      summary: List ARR instances
      tags:
      - ARRs
  /arrs/instances/{type}/{name}:
    get:
      description: Returns a specific ARR instance by type and name.
      parameters:
      - description: Instance type (sonarr, radarr, lidarr, readarr, whisparr, or
          sportarr)
        in: path
        name: type
        required: true
        type: string
