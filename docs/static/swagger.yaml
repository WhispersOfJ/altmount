  api.stremioManifest:
    properties:
      catalogs:
        items: {}
        type: array
      description:
        type: string
      id:
        type: string
      idPrefixes:
        items:
          type: string
        type: array
      name:
        type: string
      resources:
        items:
          type: string
        type: array
      types:
        items:
          type: string
        type: array
      version:
        type: string
    type: object
  config.APIConfig:
    properties:
      allowed_origins:
        items:
          type: string
        type: array
      key_override:
        type: string
      prefix:
        type: string
    type: object
  config.ArrsConfig:
    properties:
      enabled:
        type: boolean
      lidarr_instances:
        items:
          $ref: '#/definitions/config.ArrsInstanceConfig'
        type: array
      max_workers:
        type: integer
      queue_cleanup_enabled:
        type: boolean
      queue_cleanup_grace_period_minutes:
        type: integer
      queue_cleanup_interval_seconds:
        type: integer
      queue_cleanup_max_failures:
        description: |-
          QueueCleanupMaxFailures is the per-target failure circuit breaker. After
          BearMount has acted on the same target (a Radarr movie or Sonarr/Whisparr
          episode that keeps failing import) this many times — via queue cleanup,
          health-repair re-searches or the partial-pack reconcile — it gives up:
          it blocklists without re-searching and unmonitors the item in the *arr so it
          stops being automatically re-grabbed. 0 (the default) disables the breaker.
        type: integer
      queue_cleanup_rules:
        description: |-
          QueueCleanupRules matches an *arr status message for a stuck/failed import and
          decides the action (remove / blocklist / blocklist+search). This is the single
          message-rule list for queue cleanup; ghost/empty-folder detection runs alongside
          it in the same pass. Only items owned by BearMount's download client are touched
          (see issue #523).
        items:
          $ref: '#/definitions/config.StuckCleanupRule'
        type: array
      radarr_instances:
        items:
          $ref: '#/definitions/config.ArrsInstanceConfig'
        type: array
      readarr_instances:
        items:
          $ref: '#/definitions/config.ArrsInstanceConfig'
        type: array
      sonarr_instances:
        items:
          $ref: '#/definitions/config.ArrsInstanceConfig'
        type: array
      sportarr_instances:
        items:
          $ref: '#/definitions/config.ArrsInstanceConfig'
        type: array
      webhook_base_url:
        type: string
      whisparr_instances:
        items:
          $ref: '#/definitions/config.ArrsInstanceConfig'
        type: array
    type: object
  config.ArrsInstanceConfig:
    properties:
      api_key:
        type: string
      category:
        type: string
      enabled:
        type: boolean
      name:
        type: string
      sync_interval_hours:
        type: integer
      url:
        type: string
    type: object
  config.AuthConfig:
    properties:
      login_required:
        type: boolean
    type: object
  config.DatabaseConfig:
    properties:
      dsn:
        description: |-
          DSN is the PostgreSQL connection string (postgres only).
          Example: "postgres://user:password@localhost:5432/bearmount?sslmode=disable"
        type: string
      path:
        description: Path is the SQLite database file path (sqlite only).
        type: string
      type:
        description: 'Type selects the database backend: "sqlite" (default) or "postgres".'
        type: string
    type: object
  config.FailureMaskingConfig:
    properties:
      enabled:
        type: boolean
      threshold:
        type: integer
    type: object
  config.FuseConfig:
    properties:
      allow_other:
        type: boolean
      async_buffer_max_total_mb:
        description: |-
          AsyncBufferMaxTotalMB caps total read-ahead memory across all open files
          (MB). Buffers reserve their size only while actively streaming; over the
          cap, additional streams run unbuffered. 0 = unlimited.
        type: integer
      async_buffer_size_mb:
        description: |-
          AsyncBufferSizeMB is the per-open-file read-ahead buffer size (MB). A
          background goroutine fills it ahead of the player so reads are served
          from memory instead of blocking on the network, mirroring the buffering
          rclone's VFS provides over WebDAV. 0 disables read-ahead (every read is a
          direct passthrough — the previous behavior).
        type: integer
      attr_timeout_seconds:
        type: integer
      backend:
        description: '"hanwen" or "cgo" (empty = platform default)'
        type: string
      debug:
        type: boolean
      enabled:
        type: boolean
      entry_timeout_seconds:
        type: integer
      max_cache_size_mb:
        type: integer
      max_read_ahead_mb:
        type: integer
      mount_path:
        type: string
      no_mod_time:
        description: |-
          NoModTime reports epoch for all timestamps (mtime, ctime, atime); prevents
          media servers re-scanning on unstable VFS mtimes. Note: tools like find -atime
          will not see meaningful access times on this mount.
        type: boolean
    type: object
  config.HealthConfig:
    properties:
      acceptable_missing_segments_percentage:
        type: number
      check_all_segments:
        type: boolean
      check_batch_size:
        type: integer
      check_interval_seconds:
        type: integer
      cleanup_orphaned_metadata:
        type: boolean
      corruption_action:
        description: |-
          CorruptionAction controls what happens when the health checker or a streaming read
          confirms real (non-degraded) corruption: "repair" (default) triggers an Arr rescan;
          "delete" removes the file's metadata/NZB/health record and cleans up now-empty
          parent directories instead. Degraded files are never affected either way.
        type: string
      enabled:
        type: boolean
      excluded_categories:
        description: |-
          ExcludedCategories lists SABnzbd category names whose files must never be
          registered for health checking by the library-sync discovery pass. Matching
          is by the category's configured directory under CompleteDir and is
          case-insensitive. Empty means no categories are excluded.
        items:
          type: string
        type: array
      library_dir:
        type: string
      library_sync_concurrency:
        type: integer
      library_sync_interval_minutes:
        type: integer
      max_concurrent_jobs:
        type: integer
      max_connections_for_health_checks:
        type: integer
      max_retries:
        type: integer
      read_timeout_seconds:
        type: integer
      repair:
        $ref: '#/definitions/config.RepairConfig'
      resolve_repair_on_import:
        type: boolean
      segment_sample_percentage:
        type: integer
      verify_data:
        type: boolean
    type: object
  config.ImportConfig:
    properties:
      allow_nested_rar_extraction:
        type: boolean
      allowed_file_extensions:
        items:
          type: string
        type: array
      damage_policy:
        description: |-
          DamagePolicy governs standalone video files whose fast-fail sweep finds
          SMALL confirmed damage (within the playback padding caps, see
          internal/holes): "tolerant" (default) imports them as degraded so
          streaming zero-fills the gaps; "strict" fails the import so an ARR can
          grab a different release. Damage beyond the caps, archive-set members
          and non-video files fail either way.
        type: string
      expand_bluray_iso:
        type: boolean
      failed_item_retention_hours:
        type: integer
      filter_sample_files:
        type: boolean
      history_retention_days:
        type: integer
      import_dir:
        type: string
      import_strategy:
        $ref: '#/definitions/config.ImportStrategy'
      iso_analyze_timeout_seconds:
        type: integer
      max_concurrent_imports:
        description: |-
          MaxConcurrentImports caps the number of NZB imports that may run
          end-to-end at the same time. 0 = unlimited. NNTP connection use is
          balanced automatically: imports share the pool's full capacity and
          yield to streams (priority lane + adaptive connection budget).
        type: integer
      max_download_prefetch:
        type: integer
      max_processor_workers:
        type: integer
      queue_processing_interval_seconds:
        type: integer
      read_timeout_seconds:
        type: integer
      rename_to_nzb_name:
        type: boolean
      segment_sample_percentage:
        type: integer
      watch_dir:
        type: string
      watch_interval_seconds:
        type: integer
    type: object
  config.ImportStrategy:
    enum:
    - NONE
    - SYMLINK
    - STRM
    type: string
    x-enum-varnames:
    - ImportStrategyNone
    - ImportStrategySYMLINK
    - ImportStrategySTRM
  config.LogConfig:
    properties:
      compress:
        description: Compress old log files
        type: boolean
      file:
        description: Log file path (empty = console only)
        type: string
      level:
        description: Log level (debug, info, warn, error)
        type: string
      max_age:
        description: Max age in days to keep files
        type: integer
      max_backups:
        description: Max number of old files to keep
        type: integer
      max_size:
        description: Max size in MB before rotation
        type: integer
    type: object
  config.MetadataBackupConfig:
