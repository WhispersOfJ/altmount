  /nzb/streams:
    post:
      consumes:
      - multipart/form-data
      description: 'Accepts an NZB file (upload or URL), queues it with high priority,
        and returns Stremio-compatible stream URLs as soon as the file is accessible
        via VFS. Auth: download_key form field (SHA256 of API key) or X-Api-Key header
        (raw API key). Returns _cached=true when served from an already-completed
        item.'
      parameters:
      - description: NZB file to process (mutually exclusive with nzb_url)
        in: formData
        name: file
        type: file
      - description: URL to download the NZB from (mutually exclusive with file)
        in: formData
        name: nzb_url
        type: string
      - description: 'SHA256 hash of the user''s API key (alternative: X-Api-Key header)'
        in: formData
        name: download_key
        type: string
      - description: Raw API key (alternative to download_key form field)
        in: header
        name: X-Api-Key
        type: string
      - description: 'Queue category (default: stremio)'
        in: formData
        name: category
        type: string
      - description: 'Processing timeout in seconds (default: 300)'
        in: formData
        name: timeout
        type: integer
      - description: Season number for selecting one episode from a season pack
        in: formData
        name: season
        type: integer
      - description: Episode number for selecting one episode from a season pack
        in: formData
        name: episode
        type: integer
      - description: Stremio content id (e.g. tt1234567:1:5) as an alternative to
          season/episode
        in: formData
        name: id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.StremioStreamsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/api.APIResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/api.APIResponse'
      summary: Get Stremio streams for NZB file
      tags:
      - Stremio
